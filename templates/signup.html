{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1 class="title">Signup</h1>

    {% if msg %}
    <div class="message">
        {{ msg }}
    </div>
    {% endif %}

    <form action="{{ url_for('signup') }}" method="POST" class="account_form">

        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" value="" placeholder="Enter your first name" required>

        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" value="" placeholder="Enter your last name" required>

        <label for="email">Username / Email</label>
        <input type="text" id="email" name="email" value="" placeholder="Enter your email" required>
    
        <label for="password">Password</label>
        <input type="password" id="password" name="password" value="" placeholder="Enter your password" required>

        <label for="password2">Verify Password</label>
        <input type="password" id="password2" name="password2" value="" placeholder="Enter your password again" required>

        <button type="submit">Signup</button>
    </form>
</div>
{% endblock %}
