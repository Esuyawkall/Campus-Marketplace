{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1 class="title">Manage Product</h1>

    {% if msg %}
    <div class="message">
        {{ msg }}
    </div>
    {% endif %}

    <form action="{{ url_for('manage_product', product_id=product.product_id) }}" method="POST" class="account_form">

        <label for="product_name">Product Name</label>
        <input type="text" id="product_name" name="product_name" value="{{ product.product_name }}" placeholder="Enter the product name" required>

        <label for="product_price">Product Price</label>
        <input type="number" id="product_price" name="product_price" value="{{ product.product_price }}" placeholder="Enter the product price" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Enter the product description">{{ product.description }}</textarea>

        <label for="condition">Condition</label>
        <select id="condition" name="condition">
            <option value="">Select condition</option>
            <option value="New" {% if product.product_condition == 'New' %}selected{% endif %}>New</option>
            <option value="Like New" {% if product.product_condition == 'Like New' %}selected{% endif %}>Like New</option>
            <option value="Used" {% if product.product_condition == 'Used' %}selected{% endif %}>Used</option>
            <option value="For Parts" {% if product.product_condition == 'For Parts' %}selected{% endif %}>For Parts</option>
        </select>
        <br>

        <button type="submit">Update Product</button>
    </form>
{% endblock %}
