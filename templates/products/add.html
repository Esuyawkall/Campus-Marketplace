{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1 class="title">Create Listing</h1>

    {% if msg %}
    <div class="message">
        {{ msg }}
    </div>
    {% endif %}

    <form action="{{ url_for('add_product') }}" method="POST" class="account_form">

        <label for="product_name">Product Name</label>
        <input type="text" id="product_name" name="product_name" value="" placeholder="Enter the product name" required>

        <label for="product_price">Product Price</label>
        <input type="number" id="product_price" name="product_price" value="" placeholder="Enter the product price" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Enter the product description"></textarea>

        <label for="condition">Condition</label>
        <select id="condition" name="condition">
            <option value="">Select condition</option>
            <option value="New">New</option>
            <option value="Like New">Like New</option>
            <option value="Used">Used</option>
            <option value="For Parts">For Parts</option>
        </select>
        <br>

        <button type="submit">Create Listing</button>
    </form>
{% endblock %}
